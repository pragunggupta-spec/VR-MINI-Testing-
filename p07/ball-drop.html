<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercise 7 - Ball Drop</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Sky -->
  <a-sky color="#000"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#444"></a-plane>

  <!-- Ball (falling) -->
  <a-sphere position="0 10 -5" radius="1" color="red"
    animation="property: position; to: 0 1 -5; dur: 2000; easing: easeInQuad"
    animation__bounce="property: position; dir: alternate; dur: 1000; to: 0 3 -5; loop: true">
  </a-sphere>

  <!-- Lights -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="point" position="2 5 3"></a-light>

  <!-- Camera -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
