<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercise 4 - Animations</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Sky -->
  <a-sky color="#111"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#333"></a-plane>

  <!-- Animated Box -->
  <a-box position="0 1 -5" color="orange"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"
    animation__move="property: position; dir: alternate; dur: 2000; to: 2 1 -5; loop: true"
    animation__color="property: material.color; dir: alternate; dur: 1500; to: red; loop: true">
  </a-box>

  <!-- Animated Sphere -->
  <a-sphere position="-3 1 -5" radius="1" color="blue"
    animation="property: scale; dir: alternate; dur: 2000; to: 1.5 1.5 1.5; loop: true">
  </a-sphere>

  <!-- Animated Cylinder -->
  <a-cylinder position="3 1 -5" radius="0.5" height="2" color="green"
    animation="property: rotation; to: 360 0 360; loop: true; dur: 4000">
  </a-cylinder>

  <!-- Lights -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="point" position="2 5 3"></a-light>

  <!-- Camera -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
