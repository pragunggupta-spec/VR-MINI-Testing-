<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Solar System</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- STAR BACKGROUND -->
      <a-sky color="black"></a-sky>

      <!-- SUN -->
      <a-sphere 
        position="0 1 -5" 
        radius="1" 
        color="yellow"
        emissive="yellow"
        animation="property: color; to: orange; dir: alternate; dur: 1000; loop: true">
      </a-sphere>

      <!-- MERCURY -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        <a-sphere position="2 0 0" radius="0.2" color="gray"></a-sphere>
      </a-entity>

      <!-- EARTH -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        <a-sphere position="3 0 0" radius="0.35" color="blue"></a-sphere>
      </a-entity>

      <!-- MARS -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
        <a-sphere position="4.5 0 0" radius="0.3" color="red"></a-sphere>
      </a-entity>

      <!-- JUPITER -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        <a-sphere position="6.5 0 0" radius="0.6" color="orange"></a-sphere>

        <!-- RING -->
        <a-ring position="6.5 0 0"
          rotation="90 0 0"
          radius-inner="0.8"
          radius-outer="1.2"
          color="yellow">
        </a-ring>
      </a-entity>

      <!-- CAMERA -->
      <a-entity position="0 2 8">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

      <!-- LIGHT -->
      <a-light type="point" position="0 3 3" intensity="2"></a-light>

    </a-scene>
  </body>
</html>
