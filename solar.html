<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Solar System</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Space background -->
      <a-sky color="black"></a-sky>

      <!-- SUN -->
      <a-sphere 
        position="0 1 -3" 
        radius="1" 
        color="yellow"
        animation="property: color; to: red; dir: alternate; dur: 800; loop: true">
      </a-sphere>

      <!-- MERCURY -->
      <a-entity position="0 1 -3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        <a-sphere position="1.5 0 0" radius="0.2" color="gray"></a-sphere>
      </a-entity>

      <!-- EARTH -->
      <a-entity position="0 1 -3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        <a-sphere position="2.5 0 0" radius="0.35" color="blue"></a-sphere>
      </a-entity>

      <!-- MARS -->
      <a-entity position="0 1 -3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
        <a-sphere position="3.5 0 0" radius="0.3" color="red"></a-sphere>
      </a-entity>

      <!-- JUPITER -->
      <a-entity position="0 1 -3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        <a-sphere position="5 0 0" radius="0.6" color="orange"></a-sphere>
      </a-entity>

      <!-- Camera -->
      <a-entity position="0 2 6">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

      <!-- Light -->
      <a-light type="point" position="0 3 3" intensity="2"></a-light>

    </a-scene>
  </body>
</html>
