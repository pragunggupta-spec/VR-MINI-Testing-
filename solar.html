<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Solar System</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Background -->
      <a-sky color="black"></a-sky>

      <!-- Sun (CLEAR COLOR CHANGE) -->
      <a-sphere 
        position="0 1 -3" 
        radius="1" 
        color="yellow"
        animation="property: color; to: red; dir: alternate; dur: 500; loop: true">
      </a-sphere>

      <!-- Camera -->
      <a-entity position="0 2 5">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

      <!-- Light -->
      <a-light 
        type="point" 
        position="0 3 3" 
        intensity="2">
      </a-light>

    </a-scene>
  </body>
</html>
