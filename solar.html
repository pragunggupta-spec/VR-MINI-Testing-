<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Solar System Final</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- TEXTURES -->
      <a-assets>
        <img id="earthTex" src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
        <img id="marsTex" src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg">
        <img id="jupiterTex" src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg">
        <img id="starsTex" src="https://upload.wikimedia.org/wikipedia/commons/9/99/ESO_-_Milky_Way.jpg">
      </a-assets>

      <!-- STAR BACKGROUND -->
      <a-sky src="#starsTex"></a-sky>

      <!-- SUN (Glow + Animation) -->
      <a-sphere 
        position="0 1 -5" 
        radius="1" 
        color="yellow"
        material="emissive: yellow; emissiveIntensity: 2"
        animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
      </a-sphere>

      <!-- MERCURY -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        <a-sphere position="2 0 0" radius="0.2" color="gray"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 1000">
        </a-sphere>
      </a-entity>

      <!-- EARTH -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        <a-sphere position="3 0 0" radius="0.35" src="#earthTex"
          material="shader: standard"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        </a-sphere>
      </a-entity>

      <!-- MARS -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
        <a-sphere position="4.5 0 0" radius="0.3" src="#marsTex"
          material="shader: standard"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2500">
        </a-sphere>
      </a-entity>

      <!-- JUPITER -->
      <a-entity position="0 1 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        <a-sphere position="6.5 0 0" radius="0.6" src="#jupiterTex"
          material="shader: standard"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-sphere>

        <!-- RING -->
        <a-ring position="6.5 0 0"
          rotation="90 0 0"
          radius-inner="0.8"
          radius-outer="1.2"
          color="lightyellow">
        </a-ring>
      </a-entity>

      <!-- CAMERA -->
      <a-entity position="0 2 8">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

      <!-- LIGHT -->
      <a-light type="point" position="0 3 3" intensity="2"></a-light>

    </a-scene>
  </body>
</html>
