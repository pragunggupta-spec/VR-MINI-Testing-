<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solar System</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- SPACE BACKGROUND -->
  <a-sky color="black"></a-sky>

  <!-- SUN -->
  <a-sphere position="0 1 -5" radius="1"
    material="src: Sun.png; emissive: yellow; emissiveIntensity: 2">
  </a-sphere>

  <!-- MERCURY (color only for stability) -->
  <a-entity position="0 1 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
    <a-sphere position="2 0 0" radius="0.2" color="#aaaaaa"></a-sphere>
  </a-entity>

  <!-- EARTH -->
  <a-entity position="0 1 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
    <a-sphere position="3 0 0" radius="0.35"
      material="src: Earth.png">
    </a-sphere>
  </a-entity>

  <!-- MARS -->
  <a-entity position="0 1 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
    <a-sphere position="4.5 0 0" radius="0.3"
      material="src: Mars.png">
    </a-sphere>
  </a-entity>

  <!-- JUPITER -->
  <a-entity position="0 1 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
    <a-sphere position="6.5 0 0" radius="0.6"
      material="src: Jupiter.png">
    </a-sphere>
  </a-entity>

  <!-- SATURN -->
  <a-entity position="0 1 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
    <a-sphere position="8.5 0 0" radius="0.5"
      material="src: Saturn.png">
    </a-sphere>

    <!-- RING -->
    <a-ring position="8.5 0 0"
      rotation="90 0 0"
      radius-inner="0.7"
      radius-outer="1.2"
      color="#f5deb3">
    </a-ring>
  </a-entity>

  <!-- NEPTUNE -->
  <a-entity position="0 1 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
    <a-sphere position="10.5 0 0" radius="0.45"
      material="src: Neptune.png">
    </a-sphere>
  </a-entity>

  <!-- CAMERA -->
  <a-entity position="0 2 8">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <!-- LIGHT -->
  <a-light type="point" position="0 3 3" intensity="2"></a-light>

</a-scene>
</body>
</html>
