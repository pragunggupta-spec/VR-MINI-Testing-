
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Forest Scene</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene fog="type: exponential; color: #cccccc; density: 0.02">

  <!-- ASSETS -->
  <a-assets>
    <img id="forestImg" src="forest.jpg">
  </a-assets>

  <!-- FOREST BACKGROUND -->
  <a-sky src="#forestImg"></a-sky>

  <!-- GROUND -->
  <a-plane 
    rotation="-90 0 0" 
    width="50" 
    height="50" 
    color="#2e7d32">
  </a-plane>

  <!-- LIGHTING -->
  <a-light type="ambient" intensity="0.7"></a-light>
  <a-light type="directional" position="2 5 3" intensity="0.8"></a-light>

  <!-- CAMERA -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
