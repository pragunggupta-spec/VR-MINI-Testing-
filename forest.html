<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Forest Scene</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- SKY BACKGROUND (DIRECT LINK) -->
  <a-sky src="forest.jpg"></a-sky>

  <!-- GROUND -->
  <a-plane 
    rotation="-90 0 0" 
    width="50" 
    height="50" 
    color="#2e7d32">
  </a-plane>

  <!-- LIGHT -->
  <a-light type="ambient" intensity="0.8"></a-light>
  <a-light type="directional" position="2 5 3" intensity="1"></a-light>

  <!-- TREES -->
  <a-entity position="-3 0 -5">
    <a-cylinder height="2" radius="0.2" color="#5d4037"></a-cylinder>
    <a-cone position="0 1.5 0" radius-bottom="1" height="2" color="green"></a-cone>
  </a-entity>

  <a-entity position="2 0 -6">
    <a-cylinder height="2" radius="0.2" color="#5d4037"></a-cylinder>
    <a-cone position="0 1.5 0" radius-bottom="1" height="2" color="green"></a-cone>
  </a-entity>

  <a-entity position="5 0 -4">
    <a-cylinder height="2" radius="0.2" color="#5d4037"></a-cylinder>
    <a-cone position="0 1.5 0" radius-bottom="1" height="2" color="green"></a-cone>
  </a-entity>

  <!-- CAMERA -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
