<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercise 3 - Multiple Objects</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Sky -->
  <a-sky color="#222"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#555"></a-plane>

  <!-- Objects -->
  <a-box position="-2 1 -5" color="red"></a-box>

  <a-sphere position="0 1 -5" radius="1" color="blue"></a-sphere>

  <a-cylinder position="2 1 -5" radius="0.5" height="2" color="green"></a-cylinder>

  <a-cone position="4 1 -5" radius-bottom="1" height="2" color="yellow"></a-cone>

  <!-- Light -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="point" position="2 5 3"></a-light>

  <!-- Camera -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
