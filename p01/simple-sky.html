<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercise 1 - Simple Sky</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Sky -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Ground -->
  <a-plane 
    rotation="-90 0 0" 
    width="20" 
    height="20" 
    color="green">
  </a-plane>

  <!-- Box -->
  <a-box 
    position="0 1 -3" 
    color="red">
  </a-box>

  <!-- Light -->
  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" position="2 4 2"></a-light>

  <!-- Camera -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
