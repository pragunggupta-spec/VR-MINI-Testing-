<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercise 6 - Lights + Camera + Orbit</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Sky -->
  <a-sky color="black"></a-sky>

  <!-- Sun (center) -->
  <a-sphere position="0 2 -5" radius="1.5" color="yellow"
    animation="property: material.color; dir: alternate; dur: 2000; to: orange; loop: true">
  </a-sphere>

  <!-- Orbiting Planet -->
  <a-entity id="orbit" position="0 2 -5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">

    <a-sphere position="3 0 0" radius="0.5" color="blue"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
    </a-sphere>

  </a-entity>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#222"></a-plane>

  <!-- Lights -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="point" position="0 5 -3" intensity="1"></a-light>

  <!-- Camera with controls -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
