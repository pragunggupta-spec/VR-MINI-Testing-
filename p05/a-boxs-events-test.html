<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercise 5 - Interaction</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>
<a-scene cursor="rayOrigin: mouse">

  <!-- Sky -->
  <a-sky color="#222"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#444"></a-plane>

  <!-- Clickable Box -->
  <a-box id="box"
    position="0 1 -5"
    color="blue"
    onclick="changeColor()">
  </a-box>

  <!-- Sphere -->
  <a-sphere position="-3 1 -5" radius="1" color="red"></a-sphere>

  <!-- Cylinder -->
  <a-cylinder position="3 1 -5" radius="0.5" height="2" color="green"></a-cylinder>

  <!-- Lights -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="point" position="2 5 3"></a-light>

  <!-- Camera -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>

<script>
function changeColor() {
  const box = document.querySelector("#box");
  const colors = ["red", "yellow", "green", "purple", "orange"];
  const randomColor = colors[Math.floor(Math.random() * colors.length)];
  box.setAttribute("color", randomColor);
}
</script>

</body>
</html>
